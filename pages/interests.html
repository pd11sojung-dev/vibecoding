<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관심사 선택 - 비빌언덕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5DB672;
            --primary-dark: #3F8F54;
            --primary-light: #EAF7EE;
            --text-primary: #1F2933;
            --text-secondary: #6B7280;
            --border: #E5E7EB;
            --bg: #FFFFFF;
            --sub-bg: #F8FAF9;
            --font-main: 'Noto Sans KR', -apple-system, sans-serif;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.03);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: #F0F4F2;
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .phone-container {
            width: 100%;
            max-width: 390px;
            height: 844px;
            background-color: var(--bg);
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 8px solid #1f2937;
        }

        .phone-notch {
            width: 150px;
            height: 25px;
            background-color: #1f2937;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
            z-index: 1000;
        }

        /* 헤더 */
        .app-header {
            padding: 35px 20px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background-color: var(--bg);
        }

        .back-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-primary);
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .header-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .placeholder-btn {
            width: 32px;
        }

        /* 컨텐츠 */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px 24px 30px;
            overflow-y: auto;
        }

        .title-section {
            margin-bottom: 24px;
        }

        .title-section h1 {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .title-section p {
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-secondary);
            word-break: keep-all;
        }

        /* 태그 클라우드 */
        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 30px;
        }

        /* 태그 스타일 */
        .interest-tag {
            background-color: var(--sub-bg);
            border: 1.5px solid var(--border);
            color: var(--text-primary);
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            user-select: none;
            transition: var(--transition);
        }

        .interest-tag:hover {
            border-color: var(--primary);
            background-color: var(--primary-light);
        }

        /* 활성화/선택된 태그 스타일 */
        .interest-tag.selected {
            background-color: var(--primary);
            border-color: var(--primary-dark);
            color: #ffffff;
            font-weight: 700;
            transform: scale(1.03);
            box-shadow: 0 4px 12px rgba(93, 182, 114, 0.25);
        }

        .tag-check-icon {
            display: none;
            font-size: 0.8rem;
        }

        .interest-tag.selected .tag-check-icon {
            display: inline-block;
        }

        /* 태그 카운트 안내 */
        .selection-guide {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-top: auto;
            margin-bottom: 16px;
            text-align: center;
        }

        .selection-count {
            color: var(--primary-dark);
            font-weight: 700;
        }

        /* CTA */
        .action-area {
            margin-top: auto;
        }

        .btn-cta {
            display: block;
            width: 100%;
            padding: 16px 20px;
            background-color: var(--primary);
            color: var(--bg);
            text-decoration: none;
            text-align: center;
            font-weight: 700;
            font-size: 1.05rem;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(93, 182, 114, 0.25);
            transition: var(--transition);
        }

        .btn-cta:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="phone-notch"></div>
        
        <!-- 헤더 -->
        <header class="app-header">
            <a href="neighborhood.html" class="back-btn" aria-label="이전 화면으로 이동">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 19L8 12L15 5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>
            <span class="header-title">취향 설정</span>
            <div class="placeholder-btn"></div>
        </header>

        <main class="content">
            <div class="title-section">
                <h1>관심사를 선택해주세요</h1>
                <p>선택한 취향을 바탕으로 나와 맞는 지역 멘토를 추천해드릴게요.</p>
            </div>

            <!-- 관심사 태그 클라우드 -->
            <div class="tag-cloud">
                <div class="interest-tag selected" onclick="toggleTag(this)">
                    <span class="tag-check-icon">✓</span> #도예체험
                </div>
                <div class="interest-tag" onclick="toggleTag(this)">
                    <span class="tag-check-icon">✓</span> #힐링
                </div>
                <div class="interest-tag" onclick="toggleTag(this)">
                    <span class="tag-check-icon">✓</span> #불멍
                </div>
                <div class="interest-tag selected" onclick="toggleTag(this)">
                    <span class="tag-check-icon">✓</span> #텃밭
                </div>
                <div class="interest-tag" onclick="toggleTag(this)">
                    <span class="tag-check-icon">✓</span> #독립서점
                </div>
                <div class="interest-tag" onclick="toggleTag(this)">
                    <span class="tag-check-icon">✓</span> #요가
                </div>
                <div class="interest-tag" onclick="toggleTag(this)">
                    <span class="tag-check-icon">✓</span> #지역음식
                </div>
                <div class="interest-tag" onclick="toggleTag(this)">
                    <span class="tag-check-icon">✓</span> #산책
                </div>
                <div class="interest-tag selected" onclick="toggleTag(this)">
                    <span class="tag-check-icon">✓</span> #조용한마을
                </div>
                <div class="interest-tag" onclick="toggleTag(this)">
                    <span class="tag-check-icon">✓</span> #바다마을
                </div>
                <div class="interest-tag" onclick="toggleTag(this)">
                    <span class="tag-check-icon">✓</span> #한달살이
                </div>
                <div class="interest-tag" onclick="toggleTag(this)">
                    <span class="tag-check-icon">✓</span> #지역커뮤니티
                </div>
                <div class="interest-tag" onclick="toggleTag(this)">
                    <span class="tag-check-icon">✓</span> #농장일상
                </div>
                <div class="interest-tag" onclick="toggleTag(this)">
                    <span class="tag-check-icon">✓</span> #작은가게
                </div>
                <div class="interest-tag" onclick="toggleTag(this)">
                    <span class="tag-check-icon">✓</span> #주말체험
                </div>
            </div>

            <!-- 선택 가이드 -->
            <div class="selection-guide">
                현재 <span id="count" class="selection-count">3</span>개의 취향이 선택되었습니다.
            </div>

            <!-- CTA 버튼 -->
            <div class="action-area">
                <a href="mentor-cards.html" class="btn-cta">나와 맞는 멘토 보기</a>
            </div>
        </main>
    </div>

    <!-- 최소한의 Vanilla JS 로직 -->
    <script>
        function toggleTag(element) {
            element.classList.toggle('selected');
            updateCount();
        }

        function updateCount() {
            const selectedTagsCount = document.querySelectorAll('.interest-tag.selected').length;
            document.getElementById('count').textContent = selectedTagsCount;
        }
    </script>
</body>
</html>
