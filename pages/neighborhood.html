<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지역 설정 - 비빌언덕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5DB672;
            --primary-dark: #3F8F54;
            --primary-light: #EAF7EE;
            --text-primary: #1F2933;
            --text-secondary: #6B7280;
            --border: #E5E7EB;
            --bg: #FFFFFF;
            --sub-bg: #F8FAF9;
            --font-main: 'Noto Sans KR', -apple-system, sans-serif;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.03);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: #F0F4F2;
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .phone-container {
            width: 100%;
            max-width: 390px;
            height: 844px;
            background-color: var(--bg);
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 8px solid #1f2937;
        }

        .phone-notch {
            width: 150px;
            height: 25px;
            background-color: #1f2937;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
            z-index: 1000;
        }

        /* 헤더 영역 */
        .app-header {
            padding: 35px 20px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background-color: var(--bg);
        }

        .close-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--text-primary);
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .header-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .placeholder-btn {
            width: 32px;
        }

        /* 컨텐츠 */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 20px 24px;
            overflow-y: auto;
        }

        .page-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        /* 출발지 및 관심지 선택 폼 */
        .setup-section {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background-color: var(--sub-bg);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 12px 16px;
            transition: var(--transition);
        }

        .input-wrapper.focus {
            border-color: var(--primary);
            background-color: #ffffff;
        }

        .input-icon {
            margin-right: 10px;
            font-size: 1.1rem;
            color: var(--primary);
        }

        .input-mock {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
        }

        .btn-add-city {
            background-color: var(--primary-light);
            border: 1.5px dashed var(--primary);
            color: var(--primary-dark);
            border-radius: 14px;
            padding: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            text-align: center;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: var(--transition);
        }

        .btn-add-city:hover {
            background-color: #d8eedf;
        }

        /* 이동 범위 슬라이더 UI */
        .slider-section {
            background-color: var(--sub-bg);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .slider-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .slider-value {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--primary-dark);
            background-color: var(--primary-light);
            padding: 2px 8px;
            border-radius: 6px;
        }

        /* 정적 슬라이더 트랙 */
        .slider-track-mock {
            height: 8px;
            background-color: var(--border);
            border-radius: 4px;
            position: relative;
            margin: 15px 0 10px;
        }

        .slider-fill-mock {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 70%;
            background-color: var(--primary);
            border-radius: 4px;
        }

        .slider-thumb-mock {
            position: absolute;
            left: 70%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background-color: #ffffff;
            border: 4px solid var(--primary);
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            cursor: pointer;
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        /* 정적 지도 일러스트 */
        .map-illustration-card {
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px;
            background-color: #ffffff;
            position: relative;
            height: 200px;
            margin-bottom: 20px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }

        .map-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(var(--border) 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            opacity: 0.6;
        }

        /* 지도 위 노드들 */
        .map-node {
            position: absolute;
            background-color: #ffffff;
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 4px;
            z-index: 2;
        }

        .map-node.start {
            background-color: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary-dark);
            font-size: 0.85rem;
            padding: 8px 14px;
            box-shadow: 0 6px 15px rgba(93, 182, 114, 0.2);
            z-index: 10;
        }

        .map-node.active {
            border-color: var(--primary);
            background-color: #ffffff;
        }

        .map-node.inactive {
            opacity: 0.45;
            box-shadow: none;
        }

        /* 노드 배치 */
        .node-seoul { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .node-gosung { top: 15%; right: 10%; }
        .node-yangyang { top: 38%; right: 12%; }
        .node-chuncheon { top: 25%; left: 15%; }
        .node-wonju { bottom: 20%; left: 35%; }

        /* 연결선 표시 */
        .map-connector {
            position: absolute;
            border-bottom: 2px dashed var(--primary);
            opacity: 0.4;
            transform-origin: 0 0;
            z-index: 1;
        }

        .line-seoul-gosung {
            width: 140px;
            top: 50%;
            left: 50%;
            transform: rotate(-35deg);
        }

        .line-seoul-yangyang {
            width: 120px;
            top: 50%;
            left: 50%;
            transform: rotate(-10deg);
        }

        .line-seoul-chuncheon {
            width: 110px;
            top: 50%;
            left: 50%;
            transform: rotate(-140deg);
        }

        /* 하단 안내 텍스트 */
        .info-box {
            text-align: center;
            margin-bottom: 24px;
            background-color: var(--primary-light);
            padding: 12px 16px;
            border-radius: 12px;
        }

        .info-box h4 {
            font-size: 0.9rem;
            color: var(--primary-dark);
            margin-bottom: 4px;
            font-weight: 700;
        }

        .info-box p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* CTA */
        .action-area {
            margin-top: auto;
        }

        .btn-cta {
            display: block;
            width: 100%;
            padding: 16px 20px;
            background-color: var(--primary);
            color: var(--bg);
            text-decoration: none;
            text-align: center;
            font-weight: 700;
            font-size: 1.05rem;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(93, 182, 114, 0.25);
            transition: var(--transition);
        }

        .btn-cta:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="phone-notch"></div>
        
        <!-- 헤더 영역 -->
        <header class="app-header">
            <a href="../index.html" class="close-btn" aria-label="닫기">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>
            <span class="header-title">지역 설정</span>
            <div class="placeholder-btn"></div>
        </header>

        <main class="content">
            <h1 class="page-title">출발지와 관심 지역 설정하기</h1>

            <!-- 입력 영역 -->
            <div class="setup-section">
                <div class="input-group">
                    <span class="input-label">출발지</span>
                    <div class="input-wrapper focus">
                        <span class="input-icon">📍</span>
                        <div class="input-mock">역삼동</div>
                    </div>
                </div>

                <div class="input-group">
                    <span class="input-label">관심 지역 추가</span>
                    <button class="btn-add-city" aria-label="관심 지역 추가">
                        <span>+</span> 강원 고성, 양양, 춘천 등 추가
                    </button>
                </div>
            </div>

            <!-- 이동 범위 슬라이더 -->
            <div class="slider-section">
                <div class="slider-header">
                    <span class="slider-title">이동 가능한 범위</span>
                    <span class="slider-value">주말 1박 가능 (3시간 이내)</span>
                </div>
                <div class="slider-track-mock">
                    <div class="slider-fill-mock"></div>
                    <div class="slider-thumb-mock"></div>
                </div>
                <div class="slider-labels">
                    <span>1시간 이내</span>
                    <span>주말 1박 가능</span>
                    <span>상관없음</span>
                </div>
            </div>

            <!-- 정적 지도 일러스트 -->
            <div class="map-illustration-card">
                <div class="map-grid"></div>
                
                <!-- 경로선 -->
                <div class="map-connector line-seoul-gosung"></div>
                <div class="map-connector line-seoul-yangyang"></div>
                <div class="map-connector line-seoul-chuncheon"></div>

                <!-- 노드 -->
                <div class="map-node start node-seoul">🏡 역삼동 (출발)</div>
                <div class="map-node active node-gosung">🌊 고성 (2h 40m)</div>
                <div class="map-node active node-yangyang">🧘 양양 (2h 10m)</div>
                <div class="map-node active node-chuncheon">🌲 춘천 (1h 30m)</div>
                <div class="map-node inactive node-wonju">🪵 원주 (대기)</div>
            </div>

            <!-- 안내 문구 -->
            <div class="info-box">
                <h4>역삼동에서 갈 수 있는 지역 커뮤니티 16개</h4>
                <p>선택한 이동 범위의 멘토와 체험만 볼 수 있어요.</p>
            </div>

            <!-- CTA 버튼 -->
            <div class="action-area">
                <a href="interests.html" class="btn-cta">취향 선택하러 가기</a>
            </div>
        </main>
    </div>

</body>
</html>
